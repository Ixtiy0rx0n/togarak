<!DOCTYPE html>
<html lang="uz" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcha To'garaklar</title>
    <link rel="stylesheet" href="../main.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #121212; }
        .header-bg { background-color: #0d1520; }
    </style>
</head>
<body data-root=".." class="text-gray-300 antialiased selection:bg-blue-500/30 selection:text-blue-200">
    <div class="flex min-h-screen bg-[#121212]">
        <aside class="w-64 header-bg border-r border-gray-800 hidden md:flex md:flex-col shrink-0">
            <div class="p-6 border-b border-gray-800">
                <a href="../index.html" class="flex items-center gap-3">
                    <img src="../logo.jpg" alt="GDPI" class="w-12 h-12 object-contain bg-white rounded-full p-1">
                    <span class="text-xl font-bold text-white">GDPI To'garak</span>
                </a>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="../index.html" class="block px-4 py-3 rounded-xl text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800/50">Bosh sahifa</a>
                <a href="Tugaraklar.html" class="block px-4 py-3 rounded-xl text-sm font-medium bg-blue-600/10 text-blue-400 border border-blue-500/20">To'garaklar</a>
                <a href="Register.html" class="block px-4 py-3 rounded-xl text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800/50">Ro'yxatdan o'tish</a>
            </nav>
        </aside>
        <div class="flex-1">
            <div id="weather-widget" class="absolute top-6 right-6 z-20 hidden md:block"></div>
            <header class="header-bg border-b border-gray-800 py-10 px-6 lg:px-12">
                <div class="container mx-auto">
                    <h1 class="text-3xl md:text-4xl font-bold text-white mb-4">Barcha To'garaklar</h1>
                    <p class="text-gray-400 max-w-2xl">Seed JSON asosida shakllanadigan, admin panel orqali tahrir qilinadigan to'garaklar katalogi.</p>
                    <div class="mt-8 max-w-2xl bg-[#1a2234] border border-gray-700 rounded-xl p-1 shadow-md">
                        <input id="clubsSearchInput" type="text" placeholder="Fan nomini qidiring..." class="w-full bg-transparent px-4 py-3 text-gray-200 placeholder-gray-500 focus:outline-none">
                    </div>
                </div>
            </header>
            <main class="container mx-auto px-6 lg:px-12 py-10">
                <div id="allClubsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
            </main>
        </div>
    </div>
    <script type="module" src="../dist/pages/clubs.js"></script>
</body>
</html>
