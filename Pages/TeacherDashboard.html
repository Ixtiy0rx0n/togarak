<!DOCTYPE html>
<html lang="uz" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'qituvchi Kabineti — Tugarak.uz</title>
    <meta name="description" content="Tugarak.uz — o'qituvchi shaxsiy kabineti. Guruhlar, darslar, topshiriqlar va javoblarni boshqaring.">
    <link rel="stylesheet" href="../main.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass { background: rgba(30,41,59,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .stat-t { background: rgba(30,41,59,0.5); border: 1px solid rgba(255,255,255,0.06); border-radius: 0.875rem; transition: border-color .2s, transform .2s; }
        .stat-t:hover { border-color: #3b82f6; transform: translateY(-2px); }
        .prog-bar-bg { background: #1e293b; border-radius: 99px; height: 5px; }
        .prog-bar { border-radius: 99px; height: 5px; transition: width .8s cubic-bezier(.16,1,.3,1); }
        .chart-wrap { position: relative; height: 200px; }
        #teacherClock { font-variant-numeric: tabular-nums; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body data-root=".." class="text-gray-200 antialiased h-screen flex overflow-hidden selection:bg-blue-500/30">

    <!-- LOGIN -->
    <div id="loginSection" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0f172a] p-4">
        <div class="glass rounded-2xl p-8 w-full max-w-md shadow-2xl">
            <div class="text-center mb-8">
                <img src="../logo.png" alt="Logo" class="w-12 h-12 object-contain bg-white rounded-full p-1 mx-auto mb-4">
                <h2 class="text-2xl font-bold text-white">O'qituvchi Kabineti</h2>
                <p class="text-slate-400 text-sm mt-1">Teacher akkaunt bilan kiring</p>
            </div>
            <div id="loginError" class="hidden border p-3 rounded-lg text-sm mb-4"></div>
            <form id="loginForm" class="space-y-4">
                <input id="username" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-blue-500 outline-none transition-colors" placeholder="Login" required>
                <input id="password" type="password" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-blue-500 outline-none transition-colors" placeholder="Parol" required>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-xl transition-colors">Kirish</button>
            </form>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboardSection" class="hidden w-full h-full flex">
        <!-- Sidebar -->
        <aside class="w-64 glass border-r border-slate-700/40 hidden md:flex md:flex-col shrink-0">
            <div class="p-5 border-b border-slate-700/40">
                <a href="../index.html" class="flex items-center gap-3">
                    <img src="../logo.png" alt="Logo" class="w-8 h-8 object-contain bg-white rounded-full p-0.5">
                    <span class="font-bold text-white">Tugarak.uz</span>
                </a>
            </div>
            <nav class="flex-1 p-3 space-y-1">
                <button data-action="show-overview" class="w-full text-left px-4 py-2.5 rounded-xl bg-blue-600/15 text-blue-400 border border-blue-500/20 text-sm font-medium">
                    📊 Umumiy ko'rinish
                </button>
                <button data-action="show-groups" class="w-full text-left px-4 py-2.5 rounded-xl border border-transparent text-slate-400 hover:bg-slate-800/50 text-sm font-medium transition-colors">
                    👥 Mening guruhlarim
                </button>
            </nav>
            <!-- Mini stats in sidebar -->
            <div class="p-3 space-y-2 border-t border-slate-700/40">
                <div class="glass rounded-xl p-3 space-y-2 text-xs">
                    <div class="text-slate-500 font-medium uppercase tracking-wide mb-1">Statistika</div>
                    <div class="flex justify-between"><span class="text-slate-400">Guruhlar</span><span id="sideStatGroups" class="text-white font-bold">—</span></div>
                    <div class="flex justify-between"><span class="text-slate-400">Darslar</span><span id="sideStatLessons" class="text-white font-bold">—</span></div>
                    <div class="flex justify-between"><span class="text-slate-400">Topshiriqlar</span><span id="sideStatAssignments" class="text-white font-bold">—</span></div>
                    <div class="flex justify-between"><span class="text-slate-400">Javoblar</span><span id="sideStatSubmissions" class="text-white font-bold">—</span></div>
                </div>
            
            </div>
            <div class="p-3 border-t border-slate-700/40">
                <div class="text-xs text-slate-500 px-2 py-1 mb-2 truncate">👤 <span id="userNameDisplay">O'qituvchi</span></div>
                <button id="logoutBtn" class="w-full text-red-400 bg-red-500/10 hover:bg-red-500/20 py-2.5 rounded-xl text-sm transition-colors">Chiqish</button>
            </div>
        </aside>

        <!-- Main -->
        <main class="flex-1 flex flex-col overflow-hidden relative">
            <div id="weather-widget" class="absolute top-5 right-6 z-20 hidden md:block"></div>
            <header class="glass border-b border-slate-700/40 flex items-center justify-between px-6 py-4 z-10 shrink-0">
                <div>
                    <h1 id="pageTitle" class="text-xl font-bold text-white">Umumiy ko'rinish</h1>
                    <p id="pageSubtitle" class="text-xs text-slate-400 mt-0.5">Sizning o'qitish faoliyati</p>
                </div>
                <button data-action="open-lesson-modal" class="hidden md:inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-xl text-sm font-medium transition-colors">
                    + Dars qo'shish
                </button>
            </header>

            <div class="flex-1 overflow-y-auto p-6 space-y-6">

                <!-- OVERVIEW section -->
                <div id="overviewSection" class="space-y-6">
                    <!-- KPI cards -->
                    <div id="teacherKpiCards" class="grid grid-cols-2 lg:grid-cols-4 gap-4"></div>

                    <!-- Charts row -->
                    
                </div>

                <!-- GROUPS section -->
                <div id="groupsContainer" class="hidden"></div>

                <!-- LESSONS section -->
                <div id="lessonsContainer" class="hidden">
                    <div class="flex items-center justify-between mb-6">
                        <div>
                            <button data-action="show-groups" class="text-blue-400 text-sm hover:text-blue-300 transition-colors mb-2">← Guruhlarga qaytish</button>
                            <h2 id="currentGroupTitle" class="text-xl font-bold text-white">Darslar</h2>
                        </div>
                        <button data-action="open-lesson-modal" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-xl text-sm font-medium transition-colors">+ Dars qo'shish</button>
                    </div>
                    <div id="lessonsList" class="grid xl:grid-cols-2 gap-6"></div>
                </div>

            </div>
        </main>
    </div>

    <!-- Lesson Modal -->
    <div id="lessonModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
        <div class="glass rounded-2xl p-6 w-full max-w-md">
            <div class="flex items-center justify-between mb-5">
                <h3 class="text-lg font-bold text-white">Yangi dars qo'shish</h3>
                <button id="closeLessonModalBtn" class="text-slate-400 hover:text-white transition-colors text-xl leading-none">&times;</button>
            </div>
            <form id="lessonForm" class="space-y-4">
                <input id="l_title" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-blue-500 outline-none" placeholder="Dars mavzusi" required>
                <input id="l_video" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-blue-500 outline-none" placeholder="YouTube havolasi (ixtiyoriy)">
                <div class="flex gap-3 pt-1">
                    <button type="button" onclick="document.getElementById('lessonModal').classList.add('hidden')" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-2.5 rounded-xl text-sm transition-colors">Bekor qilish</button>
                    <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-2.5 rounded-xl text-sm font-semibold transition-colors">Saqlash</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Assignment Modal -->
    <div id="assignmentModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
        <div class="glass rounded-2xl p-6 w-full max-w-md">
            <div class="flex items-center justify-between mb-5">
                <h3 class="text-lg font-bold text-white">Vazifa qo'shish</h3>
                <button id="closeAssignmentModalBtn" class="text-slate-400 hover:text-white transition-colors text-xl leading-none">&times;</button>
            </div>
            <form id="assignmentForm" class="space-y-4">
                <input id="a_lesson_id" type="hidden">
                <input id="a_title" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-purple-500 outline-none" placeholder="Vazifa sarlavhasi" required>
                <textarea id="a_desc" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-purple-500 outline-none min-h-[100px]" placeholder="Tavsif" required></textarea>
                <div>
                    <label class="text-xs text-slate-400 mb-1 block">Deadline</label>
                    <input id="a_deadline" type="datetime-local" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-purple-500 outline-none" required>
                </div>
                <div>
                    <label class="text-xs text-slate-400 mb-1 block">Fayl biriktirish (ixtiyoriy)</label>
                    <input id="a_file" type="file" class="w-full text-sm text-slate-400 bg-slate-800/30 border border-slate-700 rounded-xl px-4 py-2.5">
                </div>
                <div class="flex gap-3 pt-1">
                    <button type="button" onclick="document.getElementById('assignmentModal').classList.add('hidden')" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-2.5 rounded-xl text-sm transition-colors">Bekor qilish</button>
                    <button type="submit" class="flex-1 bg-purple-600 hover:bg-purple-500 text-white py-2.5 rounded-xl text-sm font-semibold transition-colors">Biriktirish</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="../dist/pages/teacher-dashboard.js"></script>
</body>
</html>
