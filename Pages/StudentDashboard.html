<!DOCTYPE html>
<html lang="uz" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'quvchi Kabineti</title>
    <link rel="stylesheet" href="../main.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body data-root=".." class="text-gray-200 antialiased h-screen flex overflow-hidden selection:bg-green-500/30">
    <div id="loginSection" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0f172a] p-4">
        <div class="glass rounded-2xl p-8 w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold text-center text-white mb-2">O'quvchi Kabineti</h2>
            <p class="text-center text-gray-400 text-sm mb-8">Student akkaunt bilan kiring</p>
            <div id="loginError" class="hidden border p-3 rounded-lg text-sm mb-4"></div>
            <form id="loginForm" class="space-y-5">
                <input id="username" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white" placeholder="Login" required>
                <input id="password" type="password" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white" placeholder="Parol" required>
                <button type="submit" class="w-full bg-gradient-to-r from-green-500 to-blue-600 text-white font-medium py-3 rounded-xl">Kirish</button>
            </form>
        </div>
    </div>

    <div id="dashboardSection" class="hidden w-full h-full flex">
        <aside class="w-64 glass border-r border-slate-700/50 hidden md:flex md:flex-col">
            <div class="p-6">
                <a href="../index.html" class="text-xl font-bold text-white">Tugarak</a>
            </div>
            <nav class="flex-1 px-4 space-y-2">
                <button data-action="show-groups" class="w-full text-left px-4 py-3 bg-green-600/10 text-green-400 rounded-xl">Mening guruhlarim</button>
            </nav>
            <div class="p-4 border-t border-slate-700/50">
                <button id="logoutBtn" class="w-full text-red-400 bg-red-500/10 py-3 rounded-xl">Chiqish</button>
            </div>
        </aside>
        <main class="flex-1 flex flex-col overflow-hidden relative">
            <div id="weather-widget" class="absolute top-6 right-6 z-20 hidden md:block"></div>
            <header class="h-20 glass border-b border-slate-700/50 flex items-center justify-between px-8 z-10">
                <div>
                    <h1 class="text-2xl font-bold text-white" id="pageTitle">Guruhlarim</h1>
                    <p class="text-xs text-slate-400 mt-1" id="userNameDisplay">O'quvchi</p>
                </div>
            </header>
            <div class="flex-1 overflow-y-auto p-8 space-y-6">
                <section id="groupsSection">
                    <div id="groupsList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
                </section>
                <section id="lessonsSection" class="hidden">
                    <button data-action="show-groups" class="text-green-400 text-sm mb-4">Ortga</button>
                    <h2 id="lessonsTitle" class="text-xl font-bold text-white mb-6">Darslar</h2>
                    <div id="submitMessage" class="hidden border rounded-xl p-3 mb-4"></div>
                    <div id="lessonsList" class="space-y-6"></div>
                </section>
            </div>
        </main>
    </div>

    <div id="submitModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
        <div class="glass rounded-2xl p-6 w-full max-w-md">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-bold text-white">Vazifani yuborish</h3>
                <button id="closeSubmitModalBtn" class="text-slate-400">Yopish</button>
            </div>
            <form id="submitForm" class="space-y-4">
                <input id="s_assignment_id" type="hidden">
                <input id="s_file" type="file" required class="w-full text-sm text-slate-400">
                <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-xl">Yuborish</button>
            </form>
        </div>
    </div>

    <script type="module" src="../dist/pages/student-dashboard.js"></script>
</body>
</html>
